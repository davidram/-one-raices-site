<style>
  :root {
    --banner: #1a1a2e;
    --btn: #C9A96E;
    --ring: #C9A96E;
    --bg: #f8f6f0;
    --text: #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    transition: color .3s;
    position: relative;
  }

  /* Florida beach animated background */
  .beach-bg {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background: linear-gradient(to bottom, #aee3f5 0%, #cdeef8 28%, #f6f1e3 55%, #f6f1e3 100%);
  }
  .beach-bg svg { position: absolute; bottom: 0; left: 0; width: 100%; }
  .wave-far {
    height: 38%; opacity: .55;
    animation: waveDriftSlow 14s ease-in-out infinite;
  }
  .wave-mid {
    height: 30%; opacity: .7;
    animation: waveDrift 9s ease-in-out infinite;
  }
  .wave-near {
    height: 22%; opacity: .9;
    animation: waveDriftFast 6.5s ease-in-out infinite;
  }
  .sun-glow {
    position: absolute; top: 6%; right: 12%; width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,250,225,.9), rgba(255,250,225,0) 70%);
    animation: glowPulse 6s ease-in-out infinite;
  }
  @keyframes waveDrift {
    0%, 100% { transform: translateX(0) translateY(0); }
    50% { transform: translateX(-2.5%) translateY(4px); }
  }
  @keyframes waveDriftSlow {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-1.8%); }
  }
  @keyframes waveDriftFast {
    0%, 100% { transform: translateX(0) translateY(0); }
    50% { transform: translateX(-3.5%) translateY(-3px); }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: .7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.08); }
  }
  @media (prefers-reduced-motion: reduce) {
    .wave-far, .wave-mid, .wave-near, .sun-glow { animation: none; }
  }
  .page-wrap { width: 100%; max-width: 480px; min-height: 100vh; position: relative; padding-bottom: 90px; z-index: 1; }

  /* Language toggle */
  .lang-toggle {
    position: absolute; top: 14px; right: 14px; z-index: 10;
    display: flex; background: rgba(255,255,255,.85); border-radius: 999px; padding: 3px; gap: 2px;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
  }
  .lang-opt { padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: #555; }
  .lang-opt.active { background: var(--banner); color: #fff; }

  /* Banner + profile */
  .banner { height: 110px; background: var(--banner); position: relative; }
  .profile-block {
    display: flex; flex-direction: column; align-items: center; margin-top: 0; padding: 56px 20px 16px;
  }
  .profile-name, .profile-bio {
    text-shadow: 0 1px 3px rgba(255,255,255,.6);
  }
  .avatar {
    width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--ring);
    background: #ffffff; display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 600; color: var(--text); overflow: hidden;
    box-shadow: 0 2px 10px rgba(0,0,0,.08);
  }
  .avatar img { width: 78%; height: 78%; object-fit: contain; }
  .profile-name { font-size: 20px; font-weight: 700; margin-top: 12px; text-align: center; }
  .profile-tagline { font-size: 13px; opacity: .75; margin-top: 4px; text-align: center; }
  .profile-bio { font-size: 12.5px; opacity: .65; margin-top: 8px; text-align: center; max-width: 320px; line-height: 1.5; }

  /* Contact bar (WhatsApp + Call) */
  .contact-bar { display: flex; gap: 8px; padding: 4px 20px 4px; }
  .contact-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 11px 14px; border-radius: 999px; color: #fff; font-size: 13px; font-weight: 600;
    text-decoration: none; transition: transform .12s, opacity .12s;
  }
  .contact-btn:hover { transform: translateY(-1px); opacity: .92; }
  .contact-btn.whatsapp { background: #25D366; box-shadow: 0 3px 10px rgba(37,211,102,.35); }
  .contact-btn.call { background: var(--btn); box-shadow: 0 3px 10px rgba(0,0,0,.12); }
  .contact-btn svg { width: 17px; height: 17px; fill: #fff; }

  /* Links */
  .links-section { padding: 14px 20px 6px; display: flex; flex-direction: column; gap: 10px; }
  .link-btn {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 14px;
    background: var(--btn); color: #fff; text-decoration: none; font-size: 14px; font-weight: 600;
    transition: transform .12s, opacity .12s; border: none; cursor: pointer; width: 100%; text-align: left;
  }
  .link-btn:hover { transform: translateY(-1px); opacity: .92; }
  .link-btn svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }
  .link-btn .arrow { margin-left: auto; opacity: .7; }

  /* Socials */
  .social-row { display: flex; justify-content: center; gap: 16px; padding: 18px 0 8px; }
  .social-icon {
    width: 38px; height: 38px; border-radius: 50%; background: var(--banner);
    display: flex; align-items: center; justify-content: center; text-decoration: none;
  }
  .social-icon svg { width: 18px; height: 18px; fill: #fff; }

  .footer-note { text-align: center; font-size: 11px; opacity: .45; padding: 16px 20px 0; }

  @media (max-width: 360px) {
    .profile-name { font-size: 18px; }
    .link-btn { font-size: 13px; padding: 12px 14px; }
  }
</style>

<script>
/* ====================================================================
  TRANSLATIONS — edit the "en" and "es" text below to fully customize.
==================================================================== */
const I18N = {
  en: {
    tagline: "Your Local Real Estate Expert",
    bio: "Helping families find their dream homes. Buyer, seller & renter guides. DM me anytime.",
    wa_btn: "WhatsApp me",
    call_btn: "Call now",
    link1: "Book a Free Consultation",
    link2: "View My Listings",
    link3: "What's Your Home Worth?",
    link4: "Buyer Guide",
    link5: "Seller Guide",
    link6: "Renter Guide",
    link8: "About Me / Contact",
    footer: "Powered by One Raices",
    waMsg: "Hi! I found you on Instagram and I'm interested in buying/selling a home. Can we connect?"
  },
  es: {
    tagline: "Tu Experta Local en Bienes Raíces",
    bio: "Ayudando a familias a encontrar el hogar de sus sueños. Guías de compra, venta y renta. Escríbeme cuando quieras.",
    wa_btn: "Escríbeme por WhatsApp",
    call_btn: "Llamar ahora",
    link1: "Reservar Consulta Gratuita",
    link2: "Ver Mis Propiedades",
    link3: "¿Cuánto Vale Tu Casa?",
    link4: "Guía para Compradores",
    link5: "Guía para Vendedores",
    link6: "Guía para Inquilinos",
    link8: "Sobre Mí / Contacto",
    footer: "Desarrollado por One Raices",
    waMsg: "¡Hola! Te encontré en Instagram y estoy interesado/a en comprar/vender una casa. ¿Podemos conectar?"
  }
};

function setLang(lang) {
  localStorage.setItem('oneRaicesLang', lang);
  document.documentElement.lang = lang;
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-es').classList.toggle('active', lang === 'es');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  // Update WhatsApp pre-filled message in the new language
  const waLink = document.getElementById('wa-link');
  const waNumberMatch = waLink.href.match(/wa\.me\/(\d+)/);
  const waNumber = waNumberMatch ? waNumberMatch[1] : '11234567890';
  waLink.href = `https://wa.me/${waNumber}?text=${encodeURIComponent(I18N[lang].waMsg)}`;
}

function detectInitialLang() {
  const saved = localStorage.getItem('oneRaicesLang');
  if (saved) return saved;
  const browserLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  return browserLang.startsWith('es') ? 'es' : 'en';
}

setLang(detectInitialLang());

/* ====================================================================
  Optional: basic click tracking via localStorage (no backend needed).
  Hook this up to Google Analytics / Plausible / Meta Pixel for real
  analytics — see comment block at bottom of file for instructions.
==================================================================== */
document.querySelectorAll('.link-btn, .contact-btn, .social-icon').forEach(el => {
  el.addEventListener('click', () => {
    const key = 'oneRaicesClicks';
    const data = JSON.parse(localStorage.getItem(key) || '{}');
    const label = el.querySelector('span')?.textContent || el.getAttribute('aria-label') || 'unknown';
    data[label] = (data[label] || 0) + 1;
    localStorage.setItem(key, JSON.stringify(data));
  });
});
</script>
